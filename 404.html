<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#0d1117">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex">
<title>404 — open circuit · The Intellectual Resistance</title>
<style>
:root{--bg:#0d1117;--gold:#d4a853;--copper:#c8956a;--success:#3fb950;--text:rgba(230,237,243,.92);--muted:#9aa4ae;
  --mono:'SFMono-Regular',Consolas,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",sans-serif}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(70% 100% at 50% 0,#150f08,#0d1117 70%);color:var(--text);font-family:var(--sans);padding:2rem}
.wrap{max-width:520px}
svg{width:260px;height:auto;margin:0 auto 1.5rem;display:block}
h1{font-family:var(--sans);font-size:clamp(2rem,7vw,3rem);margin:0 0 .4rem;letter-spacing:-.02em}
.code{font-family:var(--mono);color:var(--gold);font-size:.8rem;letter-spacing:.2em;text-transform:uppercase}
p{color:var(--muted);margin:1rem 0 1.6rem}
a{display:inline-block;font-weight:600;color:#1a1206;background:linear-gradient(180deg,#e0b667,#c8956a);
  padding:.75rem 1.5rem;border-radius:10px;text-decoration:none}
a:hover{filter:brightness(1.06)}
</style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 320 80" role="img" aria-label="An open circuit — the wire is broken, no current flows.">
      <line x1="10" y1="40" x2="120" y2="40" stroke="#3fb950" stroke-width="3"/>
      <line x1="120" y1="40" x2="150" y2="40" stroke="#f85149" stroke-width="3" stroke-dasharray="4 6"/>
      <line x1="170" y1="40" x2="200" y2="40" stroke="#f85149" stroke-width="3" stroke-dasharray="4 6"/>
      <line x1="200" y1="40" x2="310" y2="40" stroke="#d4a853" stroke-width="3"/>
      <circle cx="10" cy="40" r="5" fill="#3fb950"/>
      <circle cx="310" cy="40" r="5" fill="#d4a853"/>
      <text x="160" y="22" text-anchor="middle" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#f85149">open</text>
    </svg>
    <div class="code">404 · open circuit</div>
    <h1>No current here.</h1>
    <p>This page isn't on the board — the path is broken and nothing flows. Head back to the main bus.</p>
    <a href="/">Return to the Resistance</a>
  </div>
</body>
</html>
